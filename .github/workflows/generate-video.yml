name: Generate Long-Form Video

on:
  schedule:
    - cron: "30 */3 * * *"
  workflow_dispatch:
    inputs:
      idea:
        description: "Story idea/premise (leave blank to auto-invent); overrides storyboard_path"
        required: false
        default: ""
      storyboard_path:
        description: "Path to existing storyboard JSON (ignored if idea is set)"
        required: false
        default: "storyboard.json"
      scenes:
        description: "Number of scenes (only used when auto-generating storyboard)"
        required: false
        default: "40"
      clip_duration:
        description: "Seconds per clip (8-12 recommended)"
        required: false
        default: "12"
      init_image_path:
        description: "Path to seed image (leave blank to auto-fetch from Pexels)"
        required: false
        default: ""
      narrate:
        description: "Enable narration/dialogue audio (requires ElevenLabs key)"
        type: boolean
        required: false
        default: false
      crossfade:
        description: "Crossfade seconds between clips (0 = hard cuts)"
        required: false
        default: "0.5"
      title:
        description: "YouTube video title (leave blank to use storyboard title)"
        required: false
        default: ""
      description:
        description: "YouTube video description (leave blank for auto-generated)"
        required: false
        default: ""
      privacy:
        description: "YouTube privacy: public, unlisted, private"
        required: false
        default: "public"

concurrency:
  group: generate-video
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set video parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            IDX=$(( ${{ github.run_number }} % 4 ))
            case $IDX in
              0) SCENES=25; DURATION=12 ;;   #  5 min
              1) SCENES=40; DURATION=12 ;;   #  8 min
              2) SCENES=75; DURATION=12 ;;   # 15 min
              3) SCENES=100; DURATION=12 ;;  # 20 min
            esac
          else
            SCENES="${{ inputs.scenes }}"
            DURATION="${{ inputs.clip_duration }}"
          fi
          echo "SCENES=$SCENES" >> $GITHUB_ENV
          echo "CLIP_DURATION=$DURATION" >> $GITHUB_ENV
          echo "Selected: $SCENES scenes x ${DURATION}s = $(( SCENES * DURATION / 60 )) min video"

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          IMG_FLAG=""
          if [ -n "${{ inputs.init_image_path }}" ]; then
            IMG_FLAG="--init-image \"${{ inputs.init_image_path }}\""
          fi

          NARRATE_FLAG=""
          if [ "${{ inputs.narrate }}" = "true" ]; then
            NARRATE_FLAG="--narrate"
          fi

          echo "Running pipeline with $SCENES scenes, ${CLIP_DURATION}s each"

          python scripts/pipeline.py \
            --storyboard "${{ inputs.storyboard_path }}" \
            --idea "${{ inputs.idea }}" \
            --scenes "$SCENES" \
            --crossfade "${{ inputs.crossfade }}" \
            --clip-duration "$CLIP_DURATION" \
            $IMG_FLAG \
            $NARRATE_FLAG \
            --output output/final_video.mp4

      - name: Upload final video
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: |
            output/final_video.mp4
            output/final_video.metadata.json
            output/final_video.srt
          if-no-files-found: warn
          retention-days: 14

      - name: Upload to YouTube
        if: success()
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_VIDEO_TITLE: ${{ inputs.title }}
          YT_VIDEO_DESC: ${{ inputs.description }}
          YT_PRIVACY: ${{ inputs.privacy }}
        run: |
          if [ -z "$YT_REFRESH_TOKEN" ]; then
            echo "YouTube secrets not configured - skipping upload"
            exit 0
          fi
          python scripts/upload_to_youtube.py

      - name: Upload work directory (debug on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-debug
          path: work/
          retention-days: 7
