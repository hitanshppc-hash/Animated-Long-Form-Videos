name: Generate Long-Form Video

on:
  workflow_dispatch:
    inputs:
      storyboard_path:
        description: "Path to the storyboard JSON file"
        required: false
        default: "storyboard.example.json"
      init_image_path:
        description: "Path to the initial seed image (leave blank to auto-fetch from Pexels)"
        required: false
        default: ""
      title:
        description: "YouTube video title (leave blank to use storyboard title)"
        required: false
        default: ""
      description:
        description: "YouTube video description (leave blank for auto-generated)"
        required: false
        default: ""
      privacy:
        description: "YouTube privacy: public, unlisted, private"
        required: false
        default: "unlisted"

concurrency:
  group: generate-video
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          IMG_FLAG=""
          if [ -n "${{ inputs.init_image_path }}" ]; then
            IMG_FLAG="--init-image \"${{ inputs.init_image_path }}\""
          fi
          python scripts/pipeline.py \
            --storyboard "${{ inputs.storyboard_path }}" \
            $IMG_FLAG \
            --output output/final_video.mp4

      - name: Upload final video
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: output/final_video.mp4
          retention-days: 14

      - name: Upload to YouTube
        if: success()
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_VIDEO_TITLE: ${{ inputs.title }}
          YT_VIDEO_DESC: ${{ inputs.description }}
          YT_PRIVACY: ${{ inputs.privacy }}
        run: |
          if [ -z "$YT_REFRESH_TOKEN" ]; then
            echo "YouTube secrets not configured — skipping upload"
            exit 0
          fi
          python -c "
import json, os, sys
sys.path.insert(0, 'scripts')
from youtube_upload import upload

title = os.environ.get('YT_VIDEO_TITLE', '').strip()
if not title:
    title = json.load(open('storyboard.example.json')).get('title', 'Untitled Video')

desc = os.environ.get('YT_VIDEO_DESC', '').strip()
if not desc:
    desc = 'Generated with the Animated Long-Form Video Pipeline'

privacy = os.environ.get('YT_PRIVACY', 'unlisted').strip().lower()

url = upload(
    'output/final_video.mp4',
    title=title,
    description=desc,
    tags=['animation', 'long-form', 'ai-generated'],
    privacy=privacy,
)
print(f'Uploaded: {url}')
"

      - name: Upload work directory (debug on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-debug
          path: work/
          retention-days: 7
