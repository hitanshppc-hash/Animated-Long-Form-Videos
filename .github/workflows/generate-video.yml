name: Generate Long-Form Video

on:
  schedule:
    - cron: "30 */3 * * *"
  workflow_dispatch:
    inputs:
      idea:
        description: "Story idea/premise (leave blank to auto-invent); overrides storyboard_path"
        required: false
        default: ""
      storyboard_path:
        description: "Path to existing storyboard JSON (ignored if idea is set)"
        required: false
        default: "storyboard.json"
      scenes:
        description: "Number of scenes (only used when auto-generating storyboard)"
        required: false
        default: "40"
      clip_duration:
        description: "Seconds per clip (8-12 recommended)"
        required: false
        default: "12"
      init_image_path:
        description: "Path to seed image (leave blank to auto-fetch from Pexels)"
        required: false
        default: ""
      narrate:
        description: "Enable narration/dialogue audio (edge-tts, free, no key needed)"
        type: boolean
        required: false
        default: true
      crossfade:
        description: "Crossfade seconds between clips (0 = hard cuts)"
        required: false
        default: "0.5"
      title:
        description: "YouTube video title (leave blank to use storyboard title)"
        required: false
        default: ""
      description:
        description: "YouTube video description (leave blank for auto-generated)"
        required: false
        default: ""
      privacy:
        description: "YouTube privacy: public, unlisted, private"
        required: false
        default: "public"

concurrency:
  group: generate-video
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Only restores within the SAME run (key includes run_id, no
      # restore-keys fallback) so a "re-run failed jobs" retry after e.g. the
      # YouTube upload step fails can skip already-generated clips and an
      # already-merged video instead of redoing that work from scratch. A
      # fresh trigger always gets a new run_id, so different videos never
      # share cached state.
      - name: Cache work/output across re-runs
        uses: actions/cache@v4
        with:
          path: |
            work
            output
          key: pipeline-work-${{ github.run_id }}

      # history.json (past titles, used so the storyboard LLM never repeats a
      # premise) needs to grow across every run, not just retries of one run
      # — actions/cache entries are immutable per-key, so this uses a
      # per-run key with a prefix restore-key to always pull the most recent
      # prior run's history and always save a new entry.
      - name: Cache title history across runs
        uses: actions/cache@v4
        with:
          path: history.json
          key: history-json-${{ github.run_id }}
          restore-keys: |
            history-json-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set video parameters
        id: params
        run: |
          # github.event.inputs.* are only populated for workflow_dispatch runs;
          # on `schedule` runs they are empty strings, which previously got passed
          # straight through to pipeline.py (e.g. --crossfade "") and crashed argparse.
          # Fall back to the same defaults declared in `on.workflow_dispatch.inputs` below.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            IDX=$(( ${{ github.run_number }} % 4 ))
            case $IDX in
              0) SCENES=25; DURATION=12 ;;   #  5 min
              1) SCENES=40; DURATION=12 ;;   #  8 min
              2) SCENES=75; DURATION=12 ;;   # 15 min
              3) SCENES=100; DURATION=12 ;;  # 20 min
            esac
            IDEA=""
            STORYBOARD_PATH="storyboard.json"
            INIT_IMAGE_PATH=""
            NARRATE="true"
            CROSSFADE="0.5"
            TITLE=""
            DESCRIPTION=""
            PRIVACY="public"
          else
            SCENES="${{ inputs.scenes }}"
            DURATION="${{ inputs.clip_duration }}"
            IDEA="${{ inputs.idea }}"
            STORYBOARD_PATH="${{ inputs.storyboard_path }}"
            INIT_IMAGE_PATH="${{ inputs.init_image_path }}"
            NARRATE="${{ inputs.narrate }}"
            CROSSFADE="${{ inputs.crossfade }}"
            TITLE="${{ inputs.title }}"
            DESCRIPTION="${{ inputs.description }}"
            PRIVACY="${{ inputs.privacy }}"
          fi
          echo "SCENES=$SCENES" >> $GITHUB_ENV
          echo "CLIP_DURATION=$DURATION" >> $GITHUB_ENV
          echo "IDEA=$IDEA" >> $GITHUB_ENV
          echo "STORYBOARD_PATH=$STORYBOARD_PATH" >> $GITHUB_ENV
          echo "INIT_IMAGE_PATH=$INIT_IMAGE_PATH" >> $GITHUB_ENV
          echo "NARRATE=$NARRATE" >> $GITHUB_ENV
          echo "CROSSFADE=$CROSSFADE" >> $GITHUB_ENV
          echo "YT_VIDEO_TITLE=$TITLE" >> $GITHUB_ENV
          echo "YT_VIDEO_DESC=$DESCRIPTION" >> $GITHUB_ENV
          echo "YT_PRIVACY=$PRIVACY" >> $GITHUB_ENV
          echo "Selected: $SCENES scenes x ${DURATION}s = $(( SCENES * DURATION / 60 )) min video"

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          IMG_FLAG=""
          if [ -n "$INIT_IMAGE_PATH" ]; then
            IMG_FLAG="--init-image $INIT_IMAGE_PATH"
          fi

          NARRATE_FLAG=""
          if [ "$NARRATE" = "true" ]; then
            NARRATE_FLAG="--narrate"
          fi

          echo "Running pipeline with $SCENES scenes, ${CLIP_DURATION}s each"

          python scripts/pipeline.py \
            --storyboard "$STORYBOARD_PATH" \
            --idea "$IDEA" \
            --scenes "$SCENES" \
            --crossfade "$CROSSFADE" \
            --clip-duration "$CLIP_DURATION" \
            $IMG_FLAG \
            $NARRATE_FLAG \
            --output output/final_video.mp4

      - name: Upload final video
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: |
            output/final_video.mp4
            output/final_video.metadata.json
            output/final_video.srt
          if-no-files-found: warn
          retention-days: 14

      - name: Upload to YouTube
        if: success()
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          # YT_VIDEO_TITLE / YT_VIDEO_DESC / YT_PRIVACY come from the job-level
          # GITHUB_ENV set in "Set video parameters", which already resolves
          # schedule-run defaults (raw inputs.* are empty on schedule triggers).
        run: |
          if [ -z "$YT_REFRESH_TOKEN" ]; then
            echo "YouTube secrets not configured - skipping upload"
            exit 0
          fi
          python scripts/upload_to_youtube.py

      - name: Upload work directory (debug on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-debug
          path: work/
          retention-days: 7
